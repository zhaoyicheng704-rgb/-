<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>阿翘生存模拟器 - 互通版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 公共全局房间ID
    const ROOM_ID = "aq-room-2026";
    const INIT = {
      nutrition: 72,
      pressure: 38,
      teamFollow: 90,
      score: 85,
      level: 6,
      title: "资源推进者",
      logs: ["🎮 进入全网联机房间"]
    };

    const positiveActions = [
      { icon: "🥤", name: "请喝奶茶", effect: { nutrition: 5, pressure: -2 } },
      { icon: "☕", name: "请喝咖啡", effect: { nutrition: 3, pressure: 1 } },
      { icon: "🛡️", name: "阻拦周会", effect: { nutrition: 7, teamFollow: 5 } },
      { icon: "🎁", name: "争取资源", effect: { nutrition: 9, teamFollow: 7 } },
      { icon: "👏", name: "夸奖团队", effect: { teamFollow: 8 } },
      { icon: "💰", name: "争取涨薪", effect: { teamFollow: 10, pressure: 3 } },
    ];

    const negativeActions = [
      { icon: "📱", name: "深夜发消息", effect: { nutrition: -8, pressure: 5 } },
      { icon: "📋", name: "下班加需求", effect: { nutrition: -10, teamFollow: -7 } },
      { icon: "🍰", name: "画饼不给资源", effect: { teamFollow: -12 } },
      { icon: "⏰", name: "超长周会", effect: { nutrition: -5, pressure: 7 } },
      { icon: "🤦", name: "反复改需求", effect: { teamFollow: -8, pressure: 6 } },
      { icon: "🔥", name: "抢下属功劳", effect: { teamFollow: -15 } },
    ];

    // 公共云端读写
    async function getCloudState() {
      try {
        const res = await fetch(`https://api.vercel.app/state/${ROOM_ID}`);
        if (!res.ok) throw 1;
        return await res.json();
      } catch {
        return INIT;
      }
    }

    async function setCloudState(data) {
      try {
        await fetch(`https://api.vercel.app/state/${ROOM_ID}`, {
          method: "POST",
          body: JSON.stringify(data)
        });
      } catch(e) {}
    }

    function App() {
      const [state, setState] = useState(INIT);
      const timer = useRef(null);

      // 定时拉云端，全局同步
      useEffect(() => {
        const load = async () => {
          const d = await getCloudState();
          setState(d);
        };
        load();
        timer.current = setInterval(load, 1000);
        return () => clearInterval(timer.current);
      }, []);

      const doAction = async (action) => {
        const curr = await getCloudState();
        let nutrition = Math.max(0, Math.min(100, curr.nutrition + (action.effect.nutrition||0)));
        let pressure = Math.max(0, Math.min(100, curr.pressure + (action.effect.pressure||0)));
        let teamFollow = Math.max(0, Math.min(100, curr.teamFollow + (action.effect.teamFollow||0)));

        const score = Math.round(nutrition * 0.4 + teamFollow * 0.4 + (100 - pressure) * 0.2);
        let title = "边缘人", level = 1;
        if (score >= 90) { title = "职场天花板"; level = 10; }
        else if (score >= 80) { title = "资源推进者"; level = 8; }
        else if (score >= 60) { title = "骨干员工"; level = 5; }

        const logs = [...curr.logs, `[${new Date().toLocaleTimeString()}] ${action.name}`].slice(-20);
        const newData = { ...curr, nutrition, pressure, teamFollow, score, level, title, logs };
        await setCloudState(newData);
        setState(newData);
      };

      const resetRoom = async () => {
        const resetData = { ...INIT, logs: ["🔄 房间已重置"] };
        await setCloudState(resetData);
        setState(resetData);
      };

      return (
        <div className="max-w-7xl mx-auto p-4 md:p-6">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
            <div>
              <h1 className="text-3xl font-bold">👨‍💼 阿翘生存模拟器</h1>
              <p className="text-green-600 mt-1">🌐 全网真正互通 · 所有浏览器手机同步</p>
            </div>
            <div className="mt-4 md:mt-0 flex gap-3 items-center">
              <div className="bg-blue-100 px-4 py-2 rounded-xl">
                <div className="text-xs">Lv.{state.level} · {state.title}</div>
                <div className="text-xl font-bold">{state.score} 分</div>
              </div>
              <button onClick={resetRoom} className="bg-red-500 text-white px-3 py-2 rounded-xl text-sm hover:bg-red-600">
                重置房间
              </button>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div className="lg:col-span-3 bg-white rounded-2xl p-5 shadow-sm">
              <div className="flex items-center gap-2 mb-4">
                <span className="text-green-500 text-xl">🟢</span>
                <h2 className="font-semibold">正向事件</h2>
              </div>
              <div className="grid grid-cols-2 gap-3">
                {positiveActions.map((a,i)=>(
                  <button key={i} className="bg-gray-50 p-3 rounded-xl hover:bg-green-100 transition" onClick={()=>doAction(a)}>
                    <div className="text-2xl mb-1">{a.icon}</div>
                    <div className="text-xs">{a.name}</div>
                  </button>
                ))}
              </div>
            </div>

            <div className="lg:col-span-6 flex flex-col items-center">
              <div className="text-8xl mb-4">👨‍💼</div>
              <div className="w-full bg-white rounded-2xl p-6 shadow-sm">
                <div className="space-y-4">
                  <div>
                    <div className="flex justify-between text-xs mb-1">💚 营养值 {state.nutrition}</div>
                    <div className="h-3 bg-gray-100 rounded-full overflow-hidden">
                      <div className="h-full bg-green-400 rounded-full transition-all duration-300" style={{width:`${state.nutrition}%`}}></div>
                    </div>
                  </div>
                  <div>
                    <div className="flex justify-between text-xs mb-1">🧡 压力值 {state.pressure}</div>
                    <div className="h-3 bg-gray-100 rounded-full overflow-hidden">
                      <div className="h-full bg-orange-400 rounded-full transition-all duration-300" style={{width:`${state.pressure}%`}}></div>
                    </div>
                  </div>
                  <div>
                    <div className="flex justify-between text-xs mb-1">👥 团队追随 {state.teamFollow}</div>
                    <div className="h-3 bg-gray-100 rounded-full overflow-hidden">
                      <div className="h-full bg-blue-400 rounded-full transition-all duration-300" style={{width:`${state.teamFollow}%`}}></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div className="lg:col-span-3 bg-white rounded-2xl p-5 shadow-sm">
              <div className="flex items-center gap-2 mb-4">
                <span className="text-red-500 text-xl">🔥</span>
                <h2 className="font-semibold">负面事件</h2>
              </div>
              <div className="grid grid-cols-2 gap-3">
                {negativeActions.map((a,i)=>(
                  <button key={i} className="bg-gray-50 p-3 rounded-xl hover:bg-red-100 transition" onClick={()=>doAction(a)}>
                    <div className="text-2xl mb-1">{a.icon}</div>
                    <div className="text-xs">{a.name}</div>
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div className="mt-6 bg-white rounded-2xl p-5 shadow-sm">
            <h3 className="font-semibold mb-2">🕒 全局联机日志</h3>
            <div className="space-y-1 text-sm max-h-52 overflow-y-auto">
              {state.logs.map((log,i)=>(<div key={i} className="text-gray-700">{log}</div>))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

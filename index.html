<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>阿翘生存模拟器 - 多人协作版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/typescript@4.9.5/lib/typescript.umd.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">
  <div id="root"></div>

  <script type="text/typescript">
    const { useState, useEffect } = React;

    // 全局状态类型
    interface GameState {
      nutrition: number;
      pressure: number;
      teamFollow: number;
      score: number;
      level: number;
      title: string;
      logs: string[];
    }

    // 事件类型
    interface Action {
      icon: string;
      name: string;
      effect: Partial<GameState>;
      desc: string;
      color: string;
    }

    // 初始化状态
    const initialState: GameState = {
      nutrition: 72,
      pressure: 38,
      teamFollow: 90,
      score: 85,
      level: 6,
      title: "资源推进者",
      logs: ["🎮 欢迎来到多人协作版阿翘生存模拟器！"],
    };

    // 正向事件
    const positiveActions: Action[] = [
      { icon: "🥤", name: "请喝奶茶", effect: { nutrition: 5, pressure: -2 }, desc: "压力-", color: "green" },
      { icon: "☕", name: "请喝咖啡", effect: { nutrition: 3, pressure: 1 }, desc: "提神+", color: "yellow" },
      { icon: "🛡️", name: "阻拦周会", effect: { nutrition: 7, teamFollow: 5 }, desc: "团队+", color: "green" },
      { icon: "🎁", name: "争取资源", effect: { nutrition: 9, teamFollow: 7 }, desc: "资源+", color: "green" },
      { icon: "👏", name: "夸奖团队", effect: { teamFollow: 8 }, desc: "信心+", color: "green" },
      { icon: "💰", name: "争取涨薪", effect: { teamFollow: 10, pressure: 3 }, desc: "好感+", color: "green" },
    ];

    // 惩罚事件
    const negativeActions: Action[] = [
      { icon: "📱", name: "深夜发消息", effect: { nutrition: -8, pressure: 5 }, desc: "睡眠-", color: "red" },
      { icon: "📋", name: "下班加需求", effect: { nutrition: -10, teamFollow: -7 }, desc: "血压+", color: "red" },
      { icon: "🍰", name: "画饼不给资源", effect: { teamFollow: -12 }, desc: "信任-", color: "red" },
      { icon: "⏰", name: "超长周会", effect: { nutrition: -5, pressure: 7 }, desc: "消耗+", color: "red" },
      { icon: "🤦", name: "反复改需求", effect: { teamFollow: -8, pressure: 6 }, desc: "耐心-", color: "red" },
      { icon: "🔥", name: "抢下属功劳", effect: { teamFollow: -15 }, desc: "好感-", color: "red" },
    ];

    // 主组件
    function App() {
      const [state, setState] = useState<GameState>(initialState);

      // 多人实时同步：监听 localStorage
      useEffect(() => {
        const sync = (e: StorageEvent) => {
          if (e.key === "aq-game-state") {
            try {
              const data = JSON.parse(e.newValue || "");
              setState(data);
            } catch {}
          }
        };

        window.addEventListener("storage", sync);
        return () => window.removeEventListener("storage", sync);
      }, []);

      // 每次变化自动同步到其他标签页
      useEffect(() => {
        localStorage.setItem("aq-game-state", JSON.stringify(state));
      }, [state]);

      // 执行操作
      const doAction = (action: Action, type: "positive" | "negative") => {
        setState((prev) => {
          let nutrition = Math.max(0, Math.min(100, (prev.nutrition || 0) + (action.effect.nutrition || 0)));
          let pressure = Math.max(0, Math.min(100, (prev.pressure || 0) + (action.effect.pressure || 0)));
          let teamFollow = Math.max(0, Math.min(100, (prev.teamFollow || 0) + (action.effect.teamFollow || 0)));

          // 计算评分
          const score = Math.round(nutrition * 0.4 + teamFollow * 0.4 + (100 - pressure) * 0.2);

          // 称号
          let title = "边缘人";
          let level = 1;
          if (score >= 90) { title = "职场天花板"; level = 10; }
          else if (score >= 80) { title = "资源推进者"; level = 8; }
          else if (score >= 60) { title = "骨干员工"; level = 5; }

          // 日志
          const logs = [...prev.logs, `[${new Date().toLocaleTimeString()}] ${action.name} → ${action.desc}`];
          if (logs.length > 15) logs.shift();

          return { ...prev, nutrition, pressure, teamFollow, score, title, level, logs };
        });
      };

      return (
        <div class="max-w-7xl mx-auto p-4 md:p-6">
          <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
            <div>
              <h1 class="text-3xl font-bold">👨‍💼 阿翘生存模拟器</h1>
              <p class="text-gray-500 mt-1">多人实时协作版 · 多标签页自动同步</p>
            </div>
            <div class="mt-4 md:mt-0 bg-blue-100 px-4 py-2 rounded-xl">
              <div class="text-xs">Lv.{state.level} · {state.title}</div>
              <div class="text-xl font-bold">{state.score} 分</div>
            </div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            {/* 左侧正向操作 */}
            <div class="lg:col-span-3 bg-white rounded-2xl p-5 shadow-sm">
              <div class="flex items-center gap-2 mb-4">
                <span class="text-green-500">🟢</span>
                <h2 class="font-semibold">补充营养</h2>
              </div>
              <div class="grid grid-cols-2 gap-3">
                {positiveActions.map((a, i) => (
                  <button 
                    key={i} 
                    class="bg-gray-50 p-3 rounded-xl hover:bg-gray-100 transition"
                    onClick={() => doAction(a, "positive")}
                  >
                    <div class="text-2xl mb-1">{a.icon}</div>
                    <div class="text-xs font-medium">{a.name}</div>
                    <div class={`text-xs mt-1 text-${a.color}-500`}>{a.desc}</div>
                  </button>
                ))}
              </div>
            </div>

            {/* 中间状态 */}
            <div class="lg:col-span-6 flex flex-col items-center justify-center">
              <div class="text-8xl mb-4">👨‍💼</div>
              <div class="w-full bg-white rounded-2xl p-6 shadow-sm">
                <div class="flex justify-between mb-4">
                  <div>
                    <div class="text-3xl font-bold">{state.score}</div>
                    <div class="text-xs text-gray-500">综合评分</div>
                  </div>
                  <div class="w-3/5 space-y-3">
                    <div>
                      <div class="flex justify-between text-xs">💚 营养 {state.nutrition}</div>
                      <div class="h-2 bg-gray-100 rounded-full mt-1">
                        <div class="h-full bg-green-400 rounded-full" style={{ width: state.nutrition + "%" }}></div>
                      </div>
                    </div>
                    <div>
                      <div class="flex justify-between text-xs">🧡 压力 {state.pressure}</div>
                      <div class="h-2 bg-gray-100 rounded-full mt-1">
                        <div class="h-full bg-orange-400 rounded-full" style={{ width: state.pressure + "%" }}></div>
                      </div>
                    </div>
                    <div>
                      <div class="flex justify-between text-xs">👥 追随 {state.teamFollow}</div>
                      <div class="h-2 bg-gray-100 rounded-full mt-1">
                        <div class="h-full bg-blue-400 rounded-full" style={{ width: state.teamFollow + "%" }}></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* 右侧惩罚事件 */}
            <div class="lg:col-span-3 bg-white rounded-2xl p-5 shadow-sm">
              <div class="flex items-center gap-2 mb-4">
                <span class="text-red-500">🔥</span>
                <h2 class="font-semibold">惩罚事件</h2>
              </div>
              <div class="grid grid-cols-2 gap-3">
                {negativeActions.map((a, i) => (
                  <button 
                    key={i} 
                    class="bg-gray-50 p-3 rounded-xl hover:bg-gray-100 transition"
                    onClick={() => doAction(a, "negative")}
                  >
                    <div class="text-2xl mb-1">{a.icon}</div>
                    <div class="text-xs font-medium">{a.name}</div>
                    <div class={`text-xs mt-1 text-${a.color}-500`}>{a.desc}</div>
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* 日志 */}
          <div class="mt-6 bg-white rounded-2xl p-5 shadow-sm max-h-60 overflow-y-auto">
            <h3 class="font-semibold mb-2">🕒 实时操作日志</h3>
            <div class="space-y-1 text-sm">
              {state.logs.map((log, i) => (
                <div key={i} class="text-gray-700">{log}</div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // 渲染
    const root = ReactDOM.createRoot(document.getElementById("root")!);
    root.render(<App />);
  </script>
</body>
</html>
